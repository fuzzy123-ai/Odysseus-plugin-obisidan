name: Feature request
description: Suggest an idea or improvement for the plugin
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for sharing your idea.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
      placeholder: A clear and concise description of the problem.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe your proposed solution.
      placeholder: What should the plugin do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe alternatives you've considered.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any context, mockups, or references.
